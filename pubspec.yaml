name: event
description: "A premium Flutter project for Fortune Event Planner with 100+ themes and dynamic UI."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
    
  # --- CORE UI & NAVIGATION ---
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  go_router: ^14.2.0 # 🚀 Upgraded for latest navigation performance
  responsive_builder: ^0.7.0
  provider: ^6.1.2 # Theme aur State management ke liye
  
  # --- ANIMATIONS & EFFECTS ---
  flutter_animate: ^4.5.0
  lottie: ^3.1.2 # Premium vector animations ke liye
  
  # --- LAYOUT & COMPONENTS ---
  carousel_slider: ^5.0.0 # Upgraded version for Sliders
  flutter_staggered_grid_view: ^0.7.0 # Masonry Gallery ke liye
  font_awesome_flutter: ^10.7.0 # Premium Icons (Brand icons ke liye best hai)
  
  # --- THEMING (100+ CUSTOM THEMES) ---
  flex_color_scheme: ^8.1.1 # Isse hum tumhare GuruDiary wale themes easily handle karenge
  
  # --- NETWORKING & UTILS ---
  http: ^1.2.0 # Google Sheets integration ke liye
  url_launcher: ^6.3.0 # 🚀 Upgraded for perfect WhatsApp launching

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0 # 🚀 Upgraded latest lints for clean code
  
  # 🚀 PRO TIP: Icons aur Splash generators dev_dependencies mein hote hain
  # Isse app ka final build size chhota banta hai!
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.4

flutter:
  uses-material-design: true

  # ==========================================
  # 🖼️ ASSETS CONFIGURATION (🚨 ADDED)
  # Iske bina app ke andar images load nahi hoti!
  # ==========================================
  assets:
    - assets/images/
    # - assets/fonts/ (Agar local fonts daaloge toh isko uncomment kar lena)

# ==========================================
# 📱 APP ICON CONFIGURATION
# ==========================================
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  web:
    generate: true
    image_path: "assets/images/logo.png" # 👈 Make sure logo.png is here
    background_color: "#000000"
    theme_color: "#D6A762"
  image_path: "assets/images/logo.png"
  min_sdk_android: 21
  adaptive_icon_background: "#000000" # Tera theme dark hai toh black sahi rahega
  adaptive_icon_foreground: "assets/images/logo.png"

# ==========================================
# 💦 SPLASH SCREEN CONFIGURATION
# ==========================================
flutter_native_splash:
  color: "#000000"
  image: "assets/images/logo.png"
  android: true
  ios: true
  web: true