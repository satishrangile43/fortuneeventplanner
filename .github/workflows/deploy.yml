name: 🚀 Deploy Fortune Event Planner to GH Pages

on:
  push:
    branches:
      - main
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true 

      - name: 📦 Install Dependencies
        run: |
          flutter clean
          flutter pub get

      - name: 🛠️ Build Flutter Web
        run: flutter build web --release --base-href /fortuneeventplanner/

      - name: 🔀 Fix Routing for GoRouter
        run: cp build/web/index.html build/web/404.html

      - name: 🚀 Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4 
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web
          force_orphan: true