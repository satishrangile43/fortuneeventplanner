<!DOCTYPE html>
<html>
<head>
  <!--
    Fortune Event Planner - Premium Web Experience
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  
  <title>Fortune Event Planner | Elite Staffing & Security</title>
  <meta name="description" content="Premium event management, professional manpower, and elite security services tailored for high-end events.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Fortune Event">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="manifest" href="manifest.json">

  <style>
    html, body {
      height: 100%;
      margin: 0;
      background-color: #000000;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    /* Wrap loader & logo inside one container to destroy it completely */
    #fortune-initial-loader {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background-color: #000000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.6s ease-out;
    }

    .logo-img {
      width: 180px;
      margin-bottom: 40px;
      animation: fadeIn 1s ease-in forwards;
    }

    /* Premium Loading Bar */
    .loading-container {
      width: 200px;
      height: 2px;
      background: rgba(214, 167, 98, 0.1);
      border-radius: 10px;
      overflow: hidden;
      position: relative;
    }

    .loading-bar {
      width: 0%;
      height: 100%;
      background: #D6A762; /* Fortune Accent Color */
      box-shadow: 0 0 15px #D6A762;
      animation: load 1.5s infinite ease-in-out;
      position: absolute;
    }

    @keyframes load {
      0% { width: 0%; left: 0; }
      50% { width: 100%; left: 0; }
      100% { width: 0%; left: 100%; }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  
  <!-- 🟢 PEHLI BAAR LOAD HONE WALA SCREEN -->
  <div id="fortune-initial-loader">
    <!-- Make sure tera logo.png ka path sahi ho yahan -->
    <img class="logo-img" src="assets/images/logo.png" alt="Fortune Logo">
    
    <div class="loading-container">
      <div class="loading-bar"></div>
    </div>
  </div>

  <!-- 🟢 FLUTTER ENGINE INITIALIZATION & LOADER DESTRUCTION -->
  <script>
    // Ye event tab fire hota hai jab Flutter web app ka UI screen pe draw ho jata hai
    window.addEventListener('flutter-first-frame', function() {
      var loader = document.getElementById('fortune-initial-loader');
      if (loader) {
        loader.style.opacity = '0'; // Fade out effect
        setTimeout(function () {
          loader.remove(); // 🚀 HTML se hamesha ke liye delete!
          document.body.style.background = 'transparent'; 
        }, 600); // Wait for fade out
      }
    });
  </script>

  <!-- Default Flutter Bootstrap -->
  <script src="flutter_bootstrap.js" async></script>

</body>
</html>
